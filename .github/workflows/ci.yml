# Single workflow: lint → build → test (chained in one job), plus a cross-platform build matrix,
# sanitizer passes, a benchmark run, and a docs build+deploy — all gated on the main job so
# nothing runs if lint/build/test fails.
#
# Why one workflow / few jobs: chaining lint+build+test into a single job pays setup (checkout,
# Xcode select, dependency resolve, cache restore) once and reuses the warm `.build` across the
# steps. The matrix, sanitizer, benchmark, and docs jobs fan out only after the gate, and only
# when relevant.
name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["README.md", "CONTRIBUTING.md", "LICENSE", ".gitignore", ".githooks/**"]
  pull_request:
    paths-ignore: ["README.md", "CONTRIBUTING.md", "LICENSE", ".gitignore", ".githooks/**"]
  # On-demand trigger for the slow sanitizer passes (and a full platform/docs run when wanted).
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on branches/PRs; never cancel an in-progress run on main.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-test:
    name: Lint, build & test (macOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Show toolchain
        run: swift --version
      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift') }}-${{ hashFiles('Sources/**', 'Tests/**', 'Plugins/**') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ hashFiles('Package.swift') }}-
            spm-${{ runner.os }}-
      - name: Lint (formatting + shipped-library discipline)
        run: swift package lint
      - name: Build
        run: swift build
      - name: Fetch conformance & benchmark fixtures
        run: swift package --allow-network-connections all --allow-writing-to-package-directory fetch-fixtures
      - name: Test (full conformance suite, with coverage)
        run: swift test --enable-code-coverage
      - name: Coverage summary
        if: always()
        run: |
          set -o pipefail
          BIN=$(swift build --show-bin-path)
          PROF="$BIN/codecov/default.profdata"
          XCTEST=$(find "$BIN" -name '*.xctest' -maxdepth 1 | head -1)
          if [ -n "$XCTEST" ] && [ -f "$PROF" ]; then
            TOOL="$XCTEST/Contents/MacOS/$(basename "$XCTEST" .xctest)"
            {
              echo "## Code coverage"
              echo '```text'
              xcrun llvm-cov report "$TOOL" -instr-profile "$PROF" \
                -ignore-filename-regex='(Tests|\.build|Benchmarks)/' 2>/dev/null | tail -25
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  changes:
    name: Detect unsafe / concurrency changes
    needs: build-test
    # Path gate for the sanitizer passes. Two risk surfaces warrant the (otherwise main-only)
    # ASan/TSan runs on a PR: the unsafe raw-pointer scanner (`Sources/ADJSONCore/Core/**`) for
    # OOB/UAF under ASan, and the shared-state concurrency layer — the encoder buffer pool and the
    # concurrent decoder — under TSan. The latter lives in `Sources/ADJSON/Concurrency/**` and
    # `Sources/ADJSON/Codable/**`, so a PR touching either must trip the sanitizers too. On push the
    # filter compares against the prior commit; on a PR, against the merge base.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      core: ${{ steps.filter.outputs.core }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'Sources/ADJSONCore/Core/**'
              - 'Sources/ADJSON/Concurrency/**'
              - 'Sources/ADJSON/Codable/**'

  release-test:
    name: Test (macOS, release / no asserts)
    needs: build-test
    # The shipping decoder compiles its bounds `assert`s out in release, so the unchecked raw-pointer
    # path is only exercised by a release test run. Slow (a full release rebuild), so gate it like the
    # other heavy jobs: main / on demand, not every PR.
    if: github.event_name != 'pull_request'
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-release-${{ hashFiles('Package.swift') }}-${{ hashFiles('Sources/**', 'Tests/**') }}
          restore-keys: |
            spm-${{ runner.os }}-release-${{ hashFiles('Package.swift') }}-
            spm-${{ runner.os }}-release-
      - name: Fetch conformance & benchmark fixtures
        run: swift package --allow-network-connections all --allow-writing-to-package-directory fetch-fixtures
      - name: Test (release)
        run: swift test -c release

  linux:
    name: Build & test (Linux)
    needs: build-test
    # ADJSONCore is Foundation-free; building it on Linux guards portability for zero-dependency
    # consumers. The full package (umbrella + macros + tests) is built/tested too, since swift-syntax,
    # Foundation, and Synchronization are all available on Linux.
    #
    # Advisory (continue-on-error) for now: the package's tools-version (6.3) tracks an unreleased
    # toolchain, so this runs the main-nightly Linux container, which can be unstable independent of
    # the code. Promote to a required gate once a matching stable Linux toolchain ships.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-main-jammy
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Show toolchain
        run: swift --version
      - name: Build Foundation-free core
        run: swift build --target ADJSONCore
      - name: Build & test full package
        run: swift test

  api-stability:
    name: API breaking changes
    needs: build-test
    # Catch accidental public-API removals/changes in PRs (additions are fine). Compares the PR head
    # against the PR's base commit on main.
    if: github.event_name == 'pull_request'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Diagnose API breaking changes vs base
        run: swift package diagnose-api-breaking-changes "${{ github.event.pull_request.base.sha }}"

  platforms:
    name: Build (${{ matrix.platform }})
    needs: build-test
    # Cross-platform compile is broad but costly: run it on main / on demand, not on every PR
    # (the macOS job above already covers compilation for PRs).
    if: github.event_name != 'pull_request'
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        platform: [iOS, tvOS, watchOS, visionOS]
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Cache SwiftPM + DerivedData
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .derivedData
          key: spm-${{ runner.os }}-${{ matrix.platform }}-${{ hashFiles('Package.swift') }}-${{ hashFiles('Sources/**') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ matrix.platform }}-${{ hashFiles('Package.swift') }}-
            spm-${{ runner.os }}-${{ matrix.platform }}-
      - name: Build for ${{ matrix.platform }}
        run: >-
          xcodebuild build
          -scheme ADJSON
          -destination "generic/platform=${{ matrix.platform }}"
          -derivedDataPath .derivedData
          -skipMacroValidation
          -skipPackagePluginValidation

  sanitizers:
    name: Sanitize (${{ matrix.name }})
    needs: [build-test, changes]
    # Sanitizers are slow (TSan ~5-15x, ASan ~2x) and rebuild the whole graph under instrumentation,
    # so run them on main / on demand — and, additionally, on any PR that touches the unsafe scanner
    # OR the concurrency layer (`Sources/ADJSONCore/Core/**`, `Sources/ADJSON/Concurrency/**`,
    # `Sources/ADJSON/Codable/**` — gated by the `changes` job), where a memory or data-race bug is
    # most likely to be introduced. Other PRs skip them. The conformance + simdjson corpora double as
    # the stress input that trips data races (TSan) and OOB / use-after-free (ASan) in the unsafe
    # scanner and the shared-state concurrency layer. These find what `-enable-actor-data-race-checks`
    # (actor-isolation only) cannot. TSan and ASan are mutually exclusive, hence two passes.
    if: github.event_name != 'pull_request' || needs.changes.outputs.core == 'true'
    runs-on: macos-26
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: thread, flags: "--sanitize=thread" }
          - { name: address, flags: "--sanitize=address --sanitize=undefined" }
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Show toolchain
        run: swift --version
      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-san-${{ matrix.name }}-${{ hashFiles('Package.swift') }}-${{ hashFiles('Sources/**', 'Tests/**', 'Plugins/**') }}
          restore-keys: |
            spm-${{ runner.os }}-san-${{ matrix.name }}-${{ hashFiles('Package.swift') }}-
            spm-${{ runner.os }}-san-${{ matrix.name }}-
      - name: Fetch conformance & benchmark fixtures
        run: swift package --allow-network-connections all --allow-writing-to-package-directory fetch-fixtures
      - name: Test under ${{ matrix.name }} sanitizer
        run: swift test ${{ matrix.flags }}

  fuzz:
    name: Fuzz (libFuzzer, Linux)
    needs: build-test
    # libFuzzer (`-sanitize=fuzzer`) is a Linux capability of the Swift toolchain — the Darwin SDK
    # rejects the flag — so the gated `ADJSONFuzz` target builds and runs here, time-boxed, on
    # main / manual dispatch. Advisory (nightly toolchain), like the Linux build job. A crash fails
    # the job and uploads the reproducer; commit any reproducer as a regression test.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-main-jammy
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Show toolchain
        run: swift --version
      - name: Fetch fixtures (seed corpus)
        run: swift package --allow-network-connections all --allow-writing-to-package-directory fetch-fixtures
      - name: Build fuzz target
        env:
          ADJSON_FUZZ: "1"
        run: swift build --target ADJSONFuzz
      - name: Assemble seed corpus from vendored corpora + CTS
        run: |
          mkdir -p corpus
          n=0
          find Tests Benchmarks -type f -name '*.json' 2>/dev/null | while read -r f; do
            cp "$f" "corpus/seed-$n.json" 2>/dev/null || true
            n=$((n + 1))
          done
          if [ -z "$(ls -A corpus 2>/dev/null)" ]; then printf '{"a":[1,2,3],"b":"x"}' > corpus/seed.json; fi
      - name: Run fuzzer (time-boxed)
        env:
          ADJSON_FUZZ: "1"
        run: |
          BIN="$(swift build --target ADJSONFuzz --show-bin-path)/ADJSONFuzz"
          "$BIN" corpus -max_total_time=300 -timeout=10 -rss_limit_mb=2048 -artifact_prefix=crash-
      - name: Upload crash reproducers
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: crash-*
          if-no-files-found: ignore

  benchmarks:
    name: Benchmark (macOS, release)
    needs: build-test
    # Benchmarks rebuild the graph in release and are noisy on shared runners, so run them on
    # main / on demand — never on every PR (same gating as the platforms/sanitizers jobs). The
    # run publishes its numbers to the run's job summary for at-a-glance tracking. Regression
    # detection is **advisory** (the threshold step below is `continue-on-error`): hosted-runner
    # variance would make a hard gate flaky, so drift is surfaced in the summary, never failing CI.
    if: github.event_name != 'pull_request'
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Show toolchain
        run: swift --version
      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-bench-${{ hashFiles('Package.swift') }}-${{ hashFiles('Sources/**', 'Benchmarks/ADJSONSuite/**') }}
          restore-keys: |
            spm-${{ runner.os }}-bench-${{ hashFiles('Package.swift') }}-
            spm-${{ runner.os }}-bench-
      - name: Install jemalloc (package-benchmark malloc metrics)
        run: brew install jemalloc
      - name: Fetch conformance & benchmark fixtures
        run: swift package --allow-network-connections all --allow-writing-to-package-directory fetch-fixtures
      - name: Run the benchmark suite (ordo-one/benchmark)
        env:
          ADJSON_DEV: "1"
        run: |
          set -o pipefail
          swift package --allow-writing-to-package-directory benchmark --format markdown | tee bench-output.md
      - name: Regression check vs committed baseline (advisory)
        # Advisory regression gate. When a baseline has been committed under `.benchmarkBaselines/main`
        # — generated on this runner class via a manual dispatch:
        #   ADJSON_DEV=1 swift package --allow-writing-to-package-directory benchmark baseline update main
        # then committed — this compares the current run against it and reports deltas. It is
        # `continue-on-error` (and a no-op until a baseline exists), so hosted-runner variance can
        # never break the build; it only surfaces drift in the job summary. Promote to a hard gate
        # only if the runner proves stable enough.
        if: always()
        continue-on-error: true
        env:
          ADJSON_DEV: "1"
        run: |
          if [ -d .benchmarkBaselines/main ]; then
            {
              echo "## Benchmark regression check (advisory) vs baseline \`main\`"
              echo '```text'
              swift package --allow-writing-to-package-directory benchmark baseline check main 2>&1 || true
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No committed baseline (.benchmarkBaselines/main); skipping advisory regression check._" \
              >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: ADJSON-vs-Foundation comparison table
        # Pairs each Foundation baseline with the ADJSON variant(s) in its workload and reports the
        # speedup — the at-a-glance headline the flat per-benchmark table above doesn't give. Reuses
        # the suite binary the step above already built (BENCH_NO_BUILD=1: no rebuild; the binary is
        # jemalloc-instrumented here, so the malloc column is populated), re-running only the
        # comparison workloads standalone to capture the debug histograms the parser reads.
        env:
          BENCH_NO_BUILD: "1"
          BENCH_FILTER: "(parse|decode|encode|numbers|corpus)/.*"
        run: |
          {
            echo "## ADJSON vs Foundation (speedup)"
            echo ""
            echo "Release · runner \`${{ runner.os }}\` · commit \`${GITHUB_SHA:0:7}\` · p50 wall-clock, higher speedup = ADJSON faster"
            echo ""
            Scripts/bench-compare.sh
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Publish results to job summary
        if: always()
        run: |
          {
            echo "## ADJSON benchmarks (ordo-one/benchmark)"
            echo ""
            echo "Release · runner \`${{ runner.os }}\` · commit \`${GITHUB_SHA:0:7}\` · p50/p90/p99 wall-clock + throughput + malloc"
            echo ""
            cat bench-output.md 2>/dev/null || echo "(no benchmark output captured)"
          } >> "$GITHUB_STEP_SUMMARY"

  docs:
    name: Build & deploy docs (Pages)
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: macos-26
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    # Serialize Pages deploys without cancelling an in-flight publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    env:
      ADJSON_DEV: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Cache SwiftPM
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-docs-${{ hashFiles('Package.swift') }}-${{ hashFiles('Sources/**') }}
          restore-keys: |
            spm-${{ runner.os }}-docs-${{ hashFiles('Package.swift') }}-
            spm-${{ runner.os }}-docs-
      - name: Build DocC site (static hosting)
        run: |
          swift package --allow-writing-to-directory "$PWD/_site" \
            generate-documentation --target ADJSON \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path ADJSON \
            --output-path "$PWD/_site"
      - name: Add root redirect to the documentation landing page
        run: |
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=documentation/adjson/">
          <link rel="canonical" href="documentation/adjson/">
          <title>ADJSON</title>
          <a href="documentation/adjson/">ADJSON documentation</a>
          HTML
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
