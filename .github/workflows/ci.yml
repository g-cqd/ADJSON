# Continuous integration: build, test, and lint the package.
#
# ADJSON uses `swift-tools-version: 6.3` and targets the iOS 26 SDK generation, so CI runs on the
# `macos-26` image (Xcode 26 / Swift 6.3+). The "Select latest Xcode" step picks the highest
# installed Xcode in case the image ships more than one.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      # Formatting gate + shipped-library discipline (no force-unwrap / no locale-sensitive strtod).
      - name: Lint
        run: ./scripts/lint.sh
